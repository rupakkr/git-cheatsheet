<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Cheatsheet — rupakkr</title>
<meta name="description" content="A searchable Git command reference with copy-to-clipboard snippets. Covers every command from git-scm.com/docs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#f0ede8;--muted:#666;--hint:#3a3a3a;
  --accent:#c8f542;--accent-dim:rgba(200,245,66,0.08);--accent-border:rgba(200,245,66,0.25);
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --r:10px;--rs:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.hdr-stats{font-size:11px;color:var(--muted);font-family:var(--mono);text-align:right}
.hdr-stats span{color:var(--accent)}
main{max-width:980px;margin:0 auto;padding:28px 24px 80px}
.search-row{position:relative;margin-bottom:16px}
.search-row svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none}
#sb{width:100%;padding:11px 14px 11px 40px;font-size:14px;font-family:var(--mono);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);transition:border-color .15s}
#sb::placeholder{color:var(--hint)}
#sb:focus{outline:none;border-color:var(--accent)}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pill{padding:4px 11px;font-size:11px;font-family:var(--mono);border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.pill:hover{border-color:var(--border-h);color:var(--text)}
.pill.on{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
.meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.meta span{color:var(--accent)}
.meta-hint{color:var(--hint);font-size:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .12s}
.card:hover{border-color:var(--border-h)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.cmd{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);line-height:1.4}
.badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap;flex-shrink:0;line-height:1.6}
.b-setup{color:#7bb8f5;border-color:rgba(123,184,245,.22);background:rgba(123,184,245,.07)}
.b-snapshot{color:#a8d8a8;border-color:rgba(168,216,168,.22);background:rgba(168,216,168,.07)}
.b-branch{color:#b89cf5;border-color:rgba(184,156,245,.22);background:rgba(184,156,245,.07)}
.b-remote{color:#6dd9b0;border-color:rgba(109,217,176,.22);background:rgba(109,217,176,.07)}
.b-inspect{color:#f5c76d;border-color:rgba(245,199,109,.22);background:rgba(245,199,109,.07)}
.b-patch{color:#f0a868;border-color:rgba(240,168,104,.22);background:rgba(240,168,104,.07)}
.b-debug{color:#f59bb8;border-color:rgba(245,155,184,.22);background:rgba(245,155,184,.07)}
.b-admin{color:#a0a09a;border-color:rgba(160,160,154,.22);background:rgba(160,160,154,.07)}
.b-email{color:#88d4f5;border-color:rgba(136,212,245,.22);background:rgba(136,212,245,.07)}
.b-plumbing{color:#c8a8f0;border-color:rgba(200,168,240,.22);background:rgba(200,168,240,.07)}
.b-server{color:#f5e87a;border-color:rgba(245,232,122,.22);background:rgba(245,232,122,.07)}
.desc{font-size:12px;color:var(--muted);line-height:1.5}
.snippets{display:flex;flex-direction:column;gap:4px}
.snippet{display:flex;align-items:stretch;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border)}
.snippet-code{flex:1;font-family:var(--mono);font-size:11.5px;color:#c4bba8;background:var(--surface2);padding:7px 10px;line-height:1.5;word-break:break-all;white-space:pre-wrap}
.snippet-copy{flex-shrink:0;width:38px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-left:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all .12s}
.snippet-copy:hover{color:var(--text);background:rgba(255,255,255,.05)}
.snippet-copy.ok{color:var(--accent)}
.empty{text-align:center;color:var(--muted);padding:3rem;font-family:var(--mono);font-size:13px;grid-column:1/-1}
footer{border-top:1px solid var(--border);padding:20px 32px;text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){header{padding:16px}main{padding:20px 14px 60px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="3.5" cy="3.5" r="2" stroke="#0d0d0d" stroke-width="1.4"/>
        <circle cx="12.5" cy="3.5" r="2" stroke="#0d0d0d" stroke-width="1.4"/>
        <circle cx="3.5" cy="12.5" r="2" stroke="#0d0d0d" stroke-width="1.4"/>
        <path d="M3.5 5.5v5M5.5 3.5h5M3.5 10.5A3.5 3.5 0 0 0 10.5 5.5" stroke="#0d0d0d" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Git Cheatsheet</div>
      <div class="logo-sub">rupakkr · every command, copy-ready</div>
    </div>
  </div>
  <div class="hdr-stats" id="hdr-stats">loading...</div>
</header>
<main>
  <div class="search-row">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
    <input id="sb" type="text" placeholder="search commands, descriptions, snippets...">
  </div>
  <div class="pills" id="pills"></div>
  <div class="meta">
    <div id="meta-count"></div>
    <div class="meta-hint">each copy button copies exactly one command</div>
  </div>
  <div class="grid" id="grid"></div>
</main>
<footer>
  source: <a href="https://git-scm.com/docs" target="_blank">git-scm.com/docs</a> &nbsp;·&nbsp;
  <a href="https://github.com/rupakkr/git-cheatsheet" target="_blank">github.com/rupakkr/git-cheatsheet</a>
</footer>

  {title:"git for-each-ref",cat:"plumbing",desc:"Output information on each ref.",snippets:["git for-each-ref --sort=-creatordate refs/heads/","git for-each-ref --format='%(refname:short)' refs/heads/","git for-each-ref --sort=-version:refname --format='%(tag)' refs/tags/"]},
  {title:"git write-tree",cat:"plumbing",desc:"Create a tree object from the current index.",snippets:["git write-tree"]},
  {title:"git verify-pack",cat:"plumbing",desc:"Validate packed Git archive files.",snippets:["git verify-pack -v .git/objects/pack/*.idx","git verify-pack .git/objects/pack/*.idx"]},
  {title:"git count-objects",cat:"plumbing",desc:"Count unpacked number of objects and their disk consumption.",snippets:["git count-objects","git count-objects -v","git count-objects -vH"]},
  {title:"git diff-index",cat:"plumbing",desc:"Compare a tree to the working tree or index.",snippets:["git diff-index HEAD","git diff-index --cached HEAD","git diff-index --quiet HEAD"]},
];

const cats=["all","setup","snapshot","branch","remote","inspect","patch","debug","email","admin","server","plumbing"];
const labels={all:"all",setup:"setup",snapshot:"snapshot",branch:"branch",remote:"remote",inspect:"inspect",patch:"patch",debug:"debug",email:"email",admin:"admin",server:"server",plumbing:"plumbing"};
const bc={setup:"b-setup",snapshot:"b-snapshot",branch:"b-branch",remote:"b-remote",inspect:"b-inspect",patch:"b-patch",debug:"b-debug",email:"b-email",admin:"b-admin",server:"b-server",plumbing:"b-plumbing"};

let cat="all",q="";
const pillsEl=document.getElementById("pills");
const gridEl=document.getElementById("grid");
const metaEl=document.getElementById("meta-count");
const hdrEl=document.getElementById("hdr-stats");

cats.forEach(c=>{
  const b=document.createElement("button");
  b.className="pill"+(c==="all"?" on":"");
  b.textContent=labels[c];
  b.onclick=()=>{cat=c;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));b.classList.add("on");render();};
  pillsEl.appendChild(b);
});
document.getElementById("sb").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

const COPY_SVG=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/></svg>`;
const CHECK_SVG=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2 9 6 13 14 4"/></svg>`;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function render(){
  const res=data.filter(d=>{
    const mc=cat==="all"||d.cat===cat;
    if(!q.trim())return mc;
    return mc&&(d.title.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.snippets.some(s=>s.toLowerCase().includes(q)));
  });
  const totalSnippets=data.reduce((a,d)=>a+d.snippets.length,0);
  hdrEl.innerHTML=`<span>${data.length}</span> commands &nbsp;·&nbsp; <span>${totalSnippets}</span> snippets`;
  metaEl.innerHTML=`<span>${res.length}</span> command${res.length!==1?"s":""}`;
  if(!res.length){gridEl.innerHTML='<div class="empty">// no results found</div>';return;}
  gridEl.innerHTML="";
  res.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    const snips=d.snippets.map(s=>{
      const uid="s"+Math.random().toString(36).slice(2);
      return`<div class="snippet"><code class="snippet-code" id="${uid}">${esc(s)}</code><button class="snippet-copy" onclick="cp('${uid}',this)" title="copy this command">${COPY_SVG}</button></div>`;
    }).join("");
    card.innerHTML=`<div class="card-head"><span class="cmd">${d.title}</span><span class="badge ${bc[d.cat]}">${labels[d.cat]}</span></div><div class="desc">${d.desc}</div><div class="snippets">${snips}</div>`;
    gridEl.appendChild(card);
  });
}

function cp(id,btn){
  const text=document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("ok");btn.innerHTML=CHECK_SVG;
    setTimeout(()=>{btn.classList.remove("ok");btn.innerHTML=COPY_SVG;},1500);
  });
}

render();
</script>
</body>
