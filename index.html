
<style>
*{box-sizing:border-box;margin:0;padding:0}
#sb{width:100%;padding:10px 14px;font-size:15px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:12px}
#sb:focus{outline:none;border-color:var(--color-border-primary)}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:4px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.pill.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.meta{font-size:12px;color:var(--color-text-secondary);margin-bottom:12px}
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px}
.card:hover{border-color:var(--color-border-secondary)}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.b-basic{background:#E6F1FB;color:#0C447C}
.b-branch{background:#EEEDFE;color:#3C3489}
.b-remote{background:#E1F5EE;color:#085041}
.b-undo{background:#FCEBEB;color:#791F1F}
.b-inspect{background:#FAEEDA;color:#633806}
.b-debug{background:#FBEAF0;color:#72243E}
.b-admin{background:#F1EFE8;color:#444441}
.desc{font-size:13px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5}
.code-wrap{position:relative}
.code{font-family:var(--font-mono);font-size:12px;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:8px 40px 8px 10px;border-radius:var(--border-radius-md);white-space:pre;overflow-x:auto;line-height:1.6}
.copy-btn{position:absolute;top:6px;right:6px;padding:2px 8px;font-size:11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.copy-btn:hover{background:var(--color-background-secondary)}
.copy-btn.ok{color:var(--color-text-success);border-color:var(--color-border-success)}
.empty{text-align:center;color:var(--color-text-secondary);padding:2.5rem;font-size:14px}
</style>

<div style="padding:1rem 0">
<input id="sb" type="text" placeholder="Search commands, descriptions, flags...">
<div class="pills" id="pills"></div>
<div class="meta" id="meta"></div>
<div class="list" id="list"></div>
</div>

<script>
const data=[
  {title:"git init",cat:"basic",desc:"Initialize a new local repository in the current directory.",code:"git init\ngit init --bare   # no working tree (server repo)"},
  {title:"git clone",cat:"basic",desc:"Copy a remote repository locally. Optionally shallow or single-branch.",code:"git clone https://github.com/user/repo.git\ngit clone --depth 1 <url>   # latest commit only\ngit clone --branch dev <url>"},
  {title:"git add",cat:"basic",desc:"Stage changes for the next commit.",code:"git add .              # stage everything\ngit add src/file.js    # stage one file\ngit add -p             # interactively pick chunks"},
  {title:"git commit",cat:"basic",desc:"Save staged changes as a snapshot.",code:'git commit -m "feat: add login"\ngit commit --amend     # edit last commit\ngit commit -a -m "msg" # auto-stage tracked files'},
  {title:"git status",cat:"basic",desc:"Show staged, unstaged, and untracked files.",code:"git status\ngit status -s          # compact view"},
  {title:"git branch",cat:"branch",desc:"List, create, rename, or delete branches.",code:"git branch                 # list local\ngit branch -a              # list all (+ remote)\ngit branch feature/auth    # create branch\ngit branch -d old-branch   # delete (safe)\ngit branch -D old-branch   # delete (force)"},
  {title:"git switch",cat:"branch",desc:"Switch branches (modern replacement for checkout).",code:"git switch main\ngit switch -c new-feature  # create + switch"},
  {title:"git checkout",cat:"branch",desc:"Switch branches or restore files (classic command).",code:"git checkout main\ngit checkout -b feature    # create + switch\ngit checkout -- file.js    # discard file changes"},
  {title:"git merge",cat:"branch",desc:"Merge another branch into the current branch.",code:"git merge feature/login\ngit merge --no-ff feature  # always make merge commit\ngit merge --squash feature # squash into one commit\ngit merge --abort          # cancel in-progress merge"},
  {title:"git rebase",cat:"branch",desc:"Replay commits on top of another base for a cleaner history.",code:"git rebase main\ngit rebase -i HEAD~3   # interactive: squash/edit/reorder\ngit rebase --abort     # cancel"},
  {title:"git stash",cat:"branch",desc:"Shelve uncommitted work temporarily and restore a clean state.",code:"git stash              # save changes\ngit stash pop          # apply + remove top stash\ngit stash list         # see all stashes\ngit stash apply stash@{1}\ngit stash drop stash@{0}"},
  {title:"git cherry-pick",cat:"branch",desc:"Apply a specific commit from another branch onto current branch.",code:"git cherry-pick abc1234\ngit cherry-pick -n abc1234  # apply without committing"},
  {title:"git fetch",cat:"remote",desc:"Download remote changes without merging into your branch.",code:"git fetch origin\ngit fetch --all        # all remotes\ngit fetch --prune      # remove stale remote refs"},
  {title:"git pull",cat:"remote",desc:"Fetch and merge (or rebase) remote changes into current branch.",code:"git pull origin main\ngit pull --rebase      # use rebase instead of merge\ngit pull --ff-only     # only allow fast-forward"},
  {title:"git push",cat:"remote",desc:"Upload local commits to a remote repository.",code:"git push origin main\ngit push -u origin main        # set upstream\ngit push --force-with-lease    # safe force push\ngit push origin --delete branch # delete remote branch\ngit push --tags                # push all tags"},
  {title:"git remote",cat:"remote",desc:"Manage remote repository connections.",code:"git remote -v\ngit remote add origin <url>\ngit remote remove origin\ngit remote rename origin upstream"},
  {title:"git reset",cat:"undo",desc:"Move HEAD to undo commits. Controls what happens to changes.",code:"git reset --soft HEAD~1   # undo commit, keep staged\ngit reset HEAD~1           # undo commit, unstage changes\ngit reset --hard HEAD~1   # undo commit, discard changes"},
  {title:"git revert",cat:"undo",desc:"Create a new commit that undoes a previous one. Safe for shared branches.",code:"git revert abc1234\ngit revert -n abc1234  # apply without committing"},
  {title:"git restore",cat:"undo",desc:"Discard working tree changes or unstage files.",code:"git restore file.js            # discard changes\ngit restore --staged file.js   # unstage file\ngit restore --source HEAD~1 file.js"},
  {title:"git log",cat:"inspect",desc:"Browse commit history with various formatting options.",code:"git log\ngit log --oneline --graph --all\ngit log -n 10              # last 10 commits\ngit log --author='name'\ngit log -- path/to/file"},
  {title:"git diff",cat:"inspect",desc:"Show what changed between commits, branches, or working state.",code:"git diff                   # unstaged changes\ngit diff --staged          # staged vs last commit\ngit diff main feature      # between branches\ngit diff HEAD~1 HEAD       # last two commits"},
  {title:"git show",cat:"inspect",desc:"Show details of a commit, tag, or file at a revision.",code:"git show abc1234\ngit show HEAD:src/app.js   # file at a commit\ngit show --stat abc1234"},
  {title:"git tag",cat:"inspect",desc:"Mark release points with a name.",code:"git tag v1.0.0\ngit tag -a v1.0.0 -m 'Release'\ngit tag -l                 # list all tags\ngit push origin --tags"},
  {title:"git blame",cat:"debug",desc:"Show who last modified each line of a file.",code:"git blame src/app.js\ngit blame -L 10,25 file.js   # specific lines\ngit blame -w file.js         # ignore whitespace"},
  {title:"git bisect",cat:"debug",desc:"Binary search commits to find which introduced a bug.",code:"git bisect start\ngit bisect bad             # current is broken\ngit bisect good v1.0.0     # known good point\ngit bisect reset           # end session"},
  {title:"git grep",cat:"debug",desc:"Search for a pattern across all tracked files.",code:'git grep "TODO"\ngit grep -n "function"     # with line numbers\ngit grep -i "error"        # case-insensitive'},
  {title:"git reflog",cat:"admin",desc:"View history of all HEAD movements. Recover lost commits.",code:"git reflog\ngit reset --hard HEAD@{2}  # restore to earlier state"},
  {title:"git clean",cat:"admin",desc:"Remove untracked files and directories.",code:"git clean -n      # dry run (preview)\ngit clean -fd     # force delete files + dirs\ngit clean -fdx    # also remove ignored files"},
  {title:"git config",cat:"admin",desc:"Read or set Git configuration at repo, user, or system level.",code:'git config --global user.name "Your Name"\ngit config --global user.email "you@mail.com"\ngit config --list\ngit config --global core.editor "code --wait"'},
  {title:"git submodule",cat:"admin",desc:"Manage external repos embedded inside your repository.",code:"git submodule add <url> path/\ngit submodule update --init --recursive\ngit submodule foreach git pull"},
];

const cats=["all","basic","branch","remote","undo","inspect","debug","admin"];
const labels={all:"All",basic:"Basics",branch:"Branching",remote:"Remote",undo:"Undo",inspect:"Inspect",debug:"Debug",admin:"Admin"};
const bc={basic:"b-basic",branch:"b-branch",remote:"b-remote",undo:"b-undo",inspect:"b-inspect",debug:"b-debug",admin:"b-admin"};

let cat="all", q="";

const pillsEl=document.getElementById("pills");
const listEl=document.getElementById("list");
const metaEl=document.getElementById("meta");

cats.forEach(c=>{
  const b=document.createElement("button");
  b.className="pill"+(c==="all"?" on":"");
  b.textContent=labels[c];
  b.onclick=()=>{
    cat=c;
    document.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));
    b.classList.add("on");
    render();
  };
  pillsEl.appendChild(b);
});

document.getElementById("sb").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

function render(){
  const res=data.filter(d=>{
    const mc=cat==="all"||d.cat===cat;
    if(!q.trim())return mc;
    return mc&&(d.title.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.code.toLowerCase().includes(q));
  });
  metaEl.textContent=res.length+" snippet"+(res.length!==1?"s":"");
  if(!res.length){listEl.innerHTML='<div class="empty">No snippets match your search.</div>';return;}
  listEl.innerHTML="";
  res.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    const codeId="c"+Math.random().toString(36).slice(2);
    card.innerHTML=`
      <div class="top">
        <span class="title">${d.title}</span>
        <div class="right">
          <span class="badge ${bc[d.cat]}">${labels[d.cat]}</span>
        </div>
      </div>
      <div class="desc">${d.desc}</div>
      <div class="code-wrap">
        <pre class="code" id="${codeId}">${d.code}</pre>
        <button class="copy-btn" onclick="copyCode('${codeId}',this)">copy</button>
      </div>`;
    listEl.appendChild(card);
  });
}

function copyCode(id,btn){
  const text=document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="copied";
    btn.classList.add("ok");
    setTimeout(()=>{btn.textContent="copy";btn.classList.remove("ok");},1500);
  });
}

render();
</script>
